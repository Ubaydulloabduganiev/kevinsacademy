<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Kevin’s Academy | Registration</title>
<meta name="description" content="Kevin’s Academy kurslariga tez ro‘yxatdan o‘tish formasi.">
<meta name="theme-color" content="#060a12">
<style>
:root{
  --bg:#060a12;
  --card:#0f1929;
  --card2:#101d31;
  --text:#f8f1e7;
  --muted:#9ca6b7;
  --gold:#d7b97b;
  --gold2:#f1d79d;
  --line:rgba(255,255,255,.12);
  --danger:#ef4444;
  --good:#5ce49b;
  --font:Inter,Arial,sans-serif;
  --serif:Georgia,"Times New Roman",serif;
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%}
body{
  min-height:100vh;
  display:grid;
  place-items:center;
  padding:18px;
  color:var(--text);
  font-family:var(--font);
  background:
    radial-gradient(circle at 15% 0%,rgba(215,185,123,.18),transparent 28%),
    radial-gradient(circle at 95% 10%,rgba(60,130,255,.16),transparent 30%),
    linear-gradient(180deg,#07101d,#03060b 70%);
}
body:before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  opacity:.05;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.95' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}
.shell{width:min(470px,100%);position:relative;z-index:1}
.top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin-bottom:14px;
}
.brand{display:flex;align-items:center;gap:10px;color:inherit;text-decoration:none}
.logo{
  width:42px;height:42px;display:grid;place-items:center;
  border:1px solid rgba(215,185,123,.7);color:var(--gold2);
  font-family:var(--serif);font-size:22px;
}
.brand b{display:block;font-family:var(--serif);letter-spacing:.08em;font-size:14px}
.brand small{display:block;color:var(--muted);font-size:9px;letter-spacing:.16em;margin-top:2px}
.lang{display:flex;border:1px solid var(--line);padding:3px;background:rgba(255,255,255,.04);border-radius:999px}
.lang button{border:0;background:transparent;color:var(--muted);font-weight:900;font-size:11px;padding:8px 10px;border-radius:999px}
.lang button.active{background:var(--gold);color:#06101d}
.card{
  border:1px solid var(--line);
  background:rgba(15,25,41,.82);
  backdrop-filter:blur(18px);
  box-shadow:0 26px 80px rgba(0,0,0,.42);
  padding:24px;
}
.pill{
  display:inline-flex;align-items:center;gap:8px;
  padding:7px 10px;border:1px solid rgba(215,185,123,.35);
  background:rgba(215,185,123,.08);color:var(--gold2);border-radius:999px;
  font-size:10px;font-weight:950;letter-spacing:.12em;text-transform:uppercase;
}
.pill i{width:7px;height:7px;border-radius:50%;background:var(--good);box-shadow:0 0 12px var(--good)}
h1{margin:14px 0 8px;font-family:var(--serif);font-weight:500;letter-spacing:-.055em;font-size:38px;line-height:.98}
h1 span{color:var(--gold)}
.sub{margin:0 0 18px;color:#c2c8d1;line-height:1.55;font-size:14px}
form{display:grid;gap:12px}
label{display:block;color:#cfd3db;font-size:12px;font-weight:900}
label span{display:block;margin:0 0 7px}
input,select,textarea{
  width:100%;min-height:52px;border:1px solid rgba(255,255,255,.14);
  background:#09111d;color:var(--text);outline:0;padding:0 14px;border-radius:12px;
}
textarea{padding-top:13px;min-height:84px;resize:vertical}
input:focus,select:focus,textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(215,185,123,.12)}
select option{background:#09111d}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.submit{
  width:100%;min-height:56px;border:0;border-radius:999px;margin-top:4px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));color:#06101d;
  font-weight:1000;font-size:14px;letter-spacing:.02em;
  box-shadow:0 14px 32px rgba(215,185,123,.16);
}
.submit:disabled{opacity:.65;cursor:not-allowed}
.note{margin:9px 0 0;color:#7f8998;font-size:11px;line-height:1.55;text-align:center}
.status{display:none;margin-top:12px;padding:12px 13px;border-radius:12px;border:1px solid rgba(92,228,155,.35);background:rgba(92,228,155,.08);color:#c7ffd9;font-size:12px;line-height:1.45}
.status.show{display:block}
.status.error{border-color:rgba(239,68,68,.4);background:rgba(239,68,68,.1);color:#fecaca}
.bottom{display:flex;justify-content:center;gap:14px;margin-top:13px;color:#8e98a9;font-size:12px}
.bottom a{color:var(--gold2);text-decoration:none}
@media(max-width:520px){
  body{padding:12px;place-items:start center}
  .shell{padding-top:8px}
  .card{padding:20px 16px;border-radius:0}
  h1{font-size:34px}
  .row{grid-template-columns:1fr}
  .brand small{display:none}
}
</style>
</head>
<body>
<main class="shell">
  <div class="top">
    <a href="/" class="brand">
      <div class="logo">K</div>
      <div><b>KEVIN’S ACADEMY</b><small>FERGANA</small></div>
    </a>
    <div class="lang">
      <button type="button" class="active" data-lang="uz">UZ</button>
      <button type="button" data-lang="ru">RU</button>
    </div>
  </div>

  <section class="card">
    <div class="pill"><i></i><span data-i18n="pill">Tez ro‘yxatdan o‘tish</span></div>
    <h1 data-i18n-html="title">Kursga <span>yozilish</span></h1>
    <p class="sub" data-i18n="sub">Formani to‘ldiring. Administrator siz bilan bog‘lanib, kurs, guruh va vaqtni aniqlaydi.</p>

    <form id="regForm">
      <label><span data-i18n="name">Ism</span><input name="name" required autocomplete="name" data-i18n-placeholder="namePh" placeholder="Ismingiz"></label>
      <label><span data-i18n="phone">Telefon raqam</span><input name="phone" required autocomplete="tel" inputmode="tel" placeholder="+998 90 123 45 67"></label>
      <label><span>Telegram</span><input name="telegram" placeholder="@username"></label>

      <label><span data-i18n="course">Kurs</span>
        <select name="course" required>
          <option value="" data-i18n="choose">Kursni tanlang</option>
          <option>General English</option>
          <option>IELTS Preparation</option>
          <option>Speaking English</option>
          <option>English for Kids & Teens</option>
          <option data-i18n="consult">Bilmayman, maslahat kerak</option>
        </select>
      </label>

      <div class="row">
        <label><span data-i18n="level">Daraja</span>
          <select name="level">
            <option data-i18n="unknown">Bilmayman</option>
            <option>Beginner</option><option>Elementary</option><option>Pre-Intermediate</option><option>Intermediate</option><option>Upper-Intermediate</option><option>Advanced</option>
          </select>
        </label>
        <label><span data-i18n="time">Qulay vaqt</span>
          <select name="preferredTime">
            <option data-i18n="any">Farqi yo‘q</option>
            <option data-i18n="morning">Ertalab</option>
            <option data-i18n="afternoon">Tushdan keyin</option>
            <option data-i18n="evening">Kechki payt</option>
          </select>
        </label>
      </div>

      <textarea name="comment" data-i18n-placeholder="commentPh" placeholder="Qo‘shimcha savol yoki maqsadingiz"></textarea>
      <button class="submit" id="submitBtn" type="submit" data-i18n="submit">Yuborish</button>
      <div id="status" class="status"></div>
      <p class="note" data-i18n="note">Ariza Kevin’s Academy administratorlariga Telegram orqali yuboriladi.</p>
    </form>
  </section>

  <div class="bottom"><a href="/" data-i18n="home">Asosiy sayt</a><span>•</span><span>© Kevin’s Academy</span></div>
</main>

<script>
const t={
  uz:{pill:"Tez ro‘yxatdan o‘tish",title:"Kursga <span>yozilish</span>",sub:"Formani to‘ldiring. Administrator siz bilan bog‘lanib, kurs, guruh va vaqtni aniqlaydi.",name:"Ism",namePh:"Ismingiz",phone:"Telefon raqam",course:"Kurs",choose:"Kursni tanlang",consult:"Bilmayman, maslahat kerak",level:"Daraja",unknown:"Bilmayman",time:"Qulay vaqt",any:"Farqi yo‘q",morning:"Ertalab",afternoon:"Tushdan keyin",evening:"Kechki payt",commentPh:"Qo‘shimcha savol yoki maqsadingiz",submit:"Yuborish",note:"Ariza Kevin’s Academy administratorlariga Telegram orqali yuboriladi.",home:"Asosiy sayt",sending:"Yuborilmoqda...",success:"Ariza yuborildi. Administrator tez orada siz bilan bog‘lanadi.",error:"Xatolik yuz berdi. Qayta urinib ko‘ring."},
  ru:{pill:"Быстрая регистрация",title:"Запись на <span>курс</span>",sub:"Заполните форму. Администратор свяжется с вами и уточнит курс, группу и время.",name:"Имя",namePh:"Ваше имя",phone:"Телефон",course:"Курс",choose:"Выберите курс",consult:"Не знаю, нужна консультация",level:"Уровень",unknown:"Не знаю",time:"Удобное время",any:"Не важно",morning:"Утро",afternoon:"После обеда",evening:"Вечер",commentPh:"Дополнительный вопрос или цель",submit:"Отправить",note:"Заявка будет отправлена администраторам Kevin’s Academy в Telegram.",home:"Главный сайт",sending:"Отправляется...",success:"Заявка отправлена. Администратор скоро свяжется с вами.",error:"Произошла ошибка. Попробуйте снова."}
};
function setLang(lang){
  document.documentElement.lang=lang;
  document.querySelectorAll('[data-i18n]').forEach(e=>{const v=t[lang][e.dataset.i18n];if(v!==undefined)e.innerText=v});
  document.querySelectorAll('[data-i18n-html]').forEach(e=>{const v=t[lang][e.dataset.i18nHtml];if(v!==undefined)e.innerHTML=v});
  document.querySelectorAll('[data-i18n-placeholder]').forEach(e=>{const v=t[lang][e.dataset.i18nPlaceholder];if(v!==undefined)e.placeholder=v});
  document.querySelectorAll('[data-lang]').forEach(b=>b.classList.toggle('active',b.dataset.lang===lang));
  localStorage.setItem('kevinRegLang',lang);
}
document.querySelectorAll('[data-lang]').forEach(b=>b.onclick=()=>setLang(b.dataset.lang));
setLang(localStorage.getItem('kevinRegLang')||'uz');
function obj(form){return Object.fromEntries(new FormData(form).entries())}
function statusMsg(text,type){const s=document.getElementById('status');s.textContent=text;s.className='status show'+(type==='error'?' error':'')}
document.getElementById('regForm').addEventListener('submit',async e=>{
  e.preventDefault();
  const form=e.currentTarget, lang=document.documentElement.lang||'uz', btn=document.getElementById('submitBtn');
  const old=btn.textContent; btn.disabled=true; btn.textContent=t[lang].sending;
  try{
    const res=await fetch('/api/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({...obj(form),language:lang,studentType:'Instagram lead',source:'Instagram form-only registration',page:location.href})});
    if(!res.ok) throw new Error('bad response');
    form.reset(); statusMsg(t[lang].success);
  }catch(err){console.error(err); statusMsg(t[lang].error,'error')}
  finally{btn.disabled=false;btn.textContent=old}
});
</script>
</body>
</html>
